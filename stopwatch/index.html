<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StopWatch Assignment</title>
    <style>
        /* User Story 2: Background black and text white */
        body {
            background-color: black;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* User Story 1: Center the container */
        .container {
            text-align: center;
            width: 300px;
        }

        /* User Story 3: Label tag for time */
        #time-label {
            font-size: 3rem;
            display: block;
            margin-bottom: 20px;
            font-family: monospace;
        }

        .controls {
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
        }

        /* User Story 4: Lap and Start buttons */
        button {
            padding: 10px 25px;
            font-size: 1rem;
            border-radius: 50%; /* Making them circular like the screenshot */
            width: 80px;
            height: 80px;
            cursor: pointer;
            border: none;
            color: white;
            transition: 0.3s;
        }

        #lap-btn { background-color: #333; }
        #start-btn { background-color: #2e7d32; }

        /* User Story 7: Running state - Stop button with red background */
        .stop-btn { background-color: #c62828 !important; }

        #laps-list {
            list-style: none;
            padding: 0;
            max-height: 200px;
            overflow-y: auto;
            border-top: 1px solid #444;
        }

        .lap-item {
            padding: 10px;
            border-bottom: 1px solid #222;
            display: flex;
            justify-content: space-between;
        }
    </style>
</head>
<body>

    <div class="container">
        <label id="time-label">00:00:00</label>

        <div class="controls">
            <button id="lap-btn">Lap</button>
            <button id="start-btn">Start</button>
        </div>

        <ul id="laps-list"></ul>
    </div>

    <script>
        let timer;
        let milliseconds = 0;
        let isRunning = false;

        const timeLabel = document.getElementById('time-label');
        const startBtn = document.getElementById('start-btn');
        const lapBtn = document.getElementById('lap-btn');
        const lapsList = document.getElementById('laps-list');

        function formatTime(ms) {
            let mins = Math.floor(ms / 6000);
            let secs = Math.floor((ms % 6000) / 100);
            let centis = ms % 100;

            return (
                (mins < 10 ? "0" + mins : mins) + ":" +
                (secs < 10 ? "0" + secs : secs) + ":" +
                (centis < 10 ? "0" + centis : centis)
            );
        }

        // User Story 5: Start timer
        function toggleStart() {
            if (!isRunning) {
                isRunning = true;
                timer = setInterval(() => {
                    milliseconds++;
                    timeLabel.innerText = formatTime(milliseconds);
                }, 10);
                
                // User Story 7: Change Start to Stop (Red)
                startBtn.innerText = "Stop";
                startBtn.classList.add('stop-btn');
                
                // Reset Lap button text if it was Reset
                lapBtn.innerText = "Lap";
            } else {
                isRunning = false;
                clearInterval(timer);
                
                startBtn.innerText = "Start";
                startBtn.classList.remove('stop-btn');
                
                // User Story 8: Change Lap to Reset when stopped
                lapBtn.innerText = "Reset";
            }
        }

        // User Story 6: Lap button (Prepend)
        function handleLapReset() {
            if (isRunning) {
                const li = document.createElement('li');
                li.className = 'lap-item';
                li.innerHTML = `<span>Lap</span> <span>${formatTime(milliseconds)}</span>`;
                lapsList.prepend(li);
            } else {
                // Reset logic (User Story 8)
                milliseconds = 0;
                timeLabel.innerText = "00:00:00";
                lapsList.innerHTML = "";
                lapBtn.innerText = "Lap";
            }
        }

        startBtn.onclick = toggleStart;
        lapBtn.onclick = handleLapReset;
    </script>
</body>
</html>
