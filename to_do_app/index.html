<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ToDo App</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            display: flex;
            height: 100vh;
            background-color: #f4f4f9;
        }
        .left-pane {
            width: 40%;
            background-color: #ffffff;
            border-right: 2px solid #ddd;
            padding: 20px;
            overflow-y: auto;
        }
        .right-pane {
            width: 60%;
            padding: 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        h2 { color: #333; margin-bottom: 20px; }
        .task-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            margin-bottom: 10px;
            background: #f9f9f9;
            border-radius: 5px;
            border: 1px solid #eee;
        }
        .task-text { flex-grow: 1; margin-right: 10px; }
        .completed { text-decoration: line-through; color: #888; }
        .controls { display: flex; gap: 10px; align-items: center; }
        .delete-btn {
            color: #ff4d4d;
            cursor: pointer;
            font-weight: bold;
            font-size: 1.2rem;
            border: none;
            background: none;
        }
        #task-form { width: 100%; max-width: 400px; text-align: center; }
        input[type="text"] {
            width: 100%;
            padding: 15px;
            font-size: 1.2rem;
            border: 2px solid #ddd;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        button#submit-btn {
            padding: 10px 25px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1rem;
        }
    </style>
</head>
<body>

    <div class="left-pane">
        <h2>TASK LIST</h2>
        <div id="task-list"></div>
    </div>

    <div class="right-pane">
        <form id="task-form">
            <h1>I need to...</h1>
            <input type="text" id="task-input" placeholder="Type your task here..." required>
            <br>
            <button type="submit" id="submit-btn">Add Task</button>
        </form>
    </div>

    <script>
        const taskForm = document.getElementById('task-form');
        const taskInput = document.getElementById('task-input');
        const taskList = document.getElementById('task-list');

        taskForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const taskValue = taskInput.value.trim();
            if (taskValue !== "") {
                const taskItem = document.createElement('div');
                taskItem.className = 'task-item';
                taskItem.innerHTML = `
                    <span class="task-text">${taskValue}</span>
                    <div class="controls">
                        <input type="checkbox" class="complete-checkbox">
                        <button class="delete-btn">×</button>
                    </div>
                `;

                const checkbox = taskItem.querySelector('.complete-checkbox');
                const taskSpan = taskItem.querySelector('.task-text');
                checkbox.addEventListener('change', () => {
                    taskSpan.classList.toggle('completed');
                });

                const deleteBtn = taskItem.querySelector('.delete-btn');
                deleteBtn.addEventListener('click', () => {
                    taskItem.remove();
                });

                taskList.appendChild(taskItem);
                taskInput.value = "";
            }
        });
    </script>
</body>
</html>
